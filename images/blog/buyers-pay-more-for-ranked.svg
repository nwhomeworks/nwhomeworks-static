<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="bp-title bp-desc" style="font-family:'Outfit','Figtree',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;max-width:100%;height:auto;">
  <title id="bp-title">What 2026 buyers pay more for, ranked by percent of project cost recouped at resale</title>
  <desc id="bp-desc">Horizontal bar chart of eight home renovation projects ordered highest to lowest by typical cost recovery, based on the NAR Remodeling Impact Report. Hardwood flooring refinish leads at 147 percent, with vinyl window replacement lowest at 67 percent.</desc>

  <rect width="800" height="580" fill="#ffffff"/>

  <text x="40" y="48" font-family="Syne,sans-serif" font-size="24" font-weight="700" fill="#1a1a1a">What 2026 Buyers Pay More For</text>
  <text x="40" y="74" font-size="14" font-weight="400" fill="#545554">Average % of project cost recouped at resale, ranked highest to lowest.</text>

  <line x1="40" y1="92" x2="760" y2="92" stroke="#e8e5e0" stroke-width="1"/>

  <line x1="568" y1="110" x2="568" y2="500" stroke="#c5c0b8" stroke-width="1" stroke-dasharray="3,4"/>
  <text x="568" y="105" font-size="10.5" fill="#8a8880" text-anchor="middle" font-weight="500">100% break-even</text>

  <g font-size="13.5" font-weight="500" fill="#1a1a1a">
    <text x="40" y="139">Hardwood flooring refinish</text>
    <text x="40" y="184">New hardwood floors</text>
    <text x="40" y="229">New roofing</text>
    <text x="40" y="274">Basement conversion to living area</text>
    <text x="40" y="319">Closet renovation</text>
    <text x="40" y="364">Kitchen upgrade</text>
    <text x="40" y="409">Bathroom renovation</text>
    <text x="40" y="454">Window replacement (vinyl)</text>
  </g>

  <g rx="2">
    <rect x="328" y="124" width="392" height="22" fill="#8eba3f"/>
    <rect x="328" y="169" width="315" height="22" fill="#8eba3f"/>
    <rect x="328" y="214" width="267" height="22" fill="#8eba3f"/>
    <rect x="328" y="259" width="229" height="22" fill="#8eba3f"/>
    <rect x="328" y="304" width="221" height="22" fill="#8eba3f"/>
    <rect x="328" y="349" width="200" height="22" fill="#8eba3f"/>
    <rect x="328" y="394" width="189" height="22" fill="#8eba3f"/>
    <rect x="328" y="439" width="179" height="22" fill="#8eba3f"/>
  </g>

  <g font-size="13" font-weight="700" fill="#1a1a1a">
    <text x="730" y="140">147%</text>
    <text x="653" y="185">118%</text>
    <text x="605" y="230">100%</text>
    <text x="567" y="275">86%</text>
    <text x="559" y="320">83%</text>
    <text x="538" y="365">75%</text>
    <text x="527" y="410">71%</text>
    <text x="517" y="455">67%</text>
  </g>

  <line x1="40" y1="498" x2="760" y2="498" stroke="#e8e5e0" stroke-width="1"/>
  <text x="40" y="525" font-size="11.5" fill="#7a6b5c" font-weight="500">Source: NAR &amp; NARI Remodeling Impact Report (nar.realtor)</text>
  <text x="40" y="544" font-size="10.5" fill="#8a8880">Figures reflect typical recovery values published in recent NAR reports. Actual ROI varies by region and project specifics.</text>
  <text x="760" y="544" font-size="10.5" fill="#8a8880" text-anchor="end" font-weight="500">NW Homeworks</text>
</svg>
