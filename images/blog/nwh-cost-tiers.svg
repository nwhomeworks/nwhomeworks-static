<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460">
  <!-- Header -->
  <rect x="0" y="0" width="680" height="60" fill="#5e9ab2" opacity="0.1"/>
  <rect x="0" y="0" width="6" height="460" fill="#5e9ab2"/>
  <text x="340" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="500" fill="#3a6e87" letter-spacing="2">NW HOMEWORKS</text>
  <text x="340" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="#3a3a3a">Seattle kitchen remodel cost by tier (2026)</text>

  <!-- Y-axis labels -->
  <text x="32" y="80" font-family="Arial,sans-serif" font-size="10" fill="#8a8880">$0</text>
  <text x="22" y="152" font-family="Arial,sans-serif" font-size="10" fill="#8a8880">$50k</text>
  <text x="22" y="224" font-family="Arial,sans-serif" font-size="10" fill="#8a8880">$100k</text>
  <text x="22" y="296" font-family="Arial,sans-serif" font-size="10" fill="#8a8880">$150k</text>

  <!-- Grid lines -->
  <line x1="52" y1="80" x2="648" y2="80" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="52" y1="152" x2="648" y2="152" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="52" y1="224" x2="648" y2="224" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="52" y1="296" x2="648" y2="296" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Bar 1: Budget $15k-$35k -->
  <rect x="80" y="260" width="110" height="50" rx="4" fill="#8eba3f" opacity="0.7"/>
  <rect x="80" y="288" width="110" height="22" rx="4" fill="#8eba3f"/>
  <text x="135" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="#8eba3f">$15k&#x2013;$35k</text>
  <text x="135" y="326" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#3a3a3a">Budget</text>
  <text x="135" y="342" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">IKEA / stock cabinets</text>
  <text x="135" y="356" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">Laminate or quartz</text>

  <!-- Bar 2: Mid-range $35k-$65k -->
  <rect x="220" y="216" width="110" height="94" rx="4" fill="#5e9ab2" opacity="0.7"/>
  <rect x="220" y="260" width="110" height="50" rx="4" fill="#5e9ab2"/>
  <text x="275" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="#5e9ab2">$35k&#x2013;$65k</text>
  <text x="275" y="326" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#3a3a3a">Mid-range</text>
  <text x="275" y="342" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">Semi-stock cabinets</text>
  <text x="275" y="356" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">Quartz + new appliances</text>

  <!-- Bar 3: Upper-mid $65k-$100k -->
  <rect x="360" y="166" width="110" height="144" rx="4" fill="#7a6b5c" opacity="0.6"/>
  <rect x="360" y="216" width="110" height="94" rx="4" fill="#7a6b5c"/>
  <text x="415" y="156" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="#7a6b5c">$65k&#x2013;$100k</text>
  <text x="415" y="326" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#3a3a3a">Upper-mid</text>
  <text x="415" y="342" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">Semi-custom cabinets</text>
  <text x="415" y="356" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">Layout changes possible</text>

  <!-- Bar 4: High-end $100k-$175k+ -->
  <rect x="500" y="94" width="110" height="216" rx="4" fill="#8a8880" opacity="0.5"/>
  <rect x="500" y="166" width="110" height="144" rx="4" fill="#8a8880"/>
  <text x="555" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="#8a8880">$100k&#x2013;$175k+</text>
  <text x="555" y="326" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#3a3a3a">High-end / custom</text>
  <text x="555" y="342" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">Fully custom cabinetry</text>
  <text x="555" y="356" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">Structural changes, luxury</text>

  <!-- Baseline -->
  <line x1="52" y1="310" x2="648" y2="310" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Seattle premium note -->
  <rect x="52" y="375" width="576" height="36" rx="6" fill="#5e9ab2" opacity="0.1" stroke="#5e9ab2" stroke-width="0.5"/>
  <text x="340" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#3a6e87">Seattle runs 20&#x2013;30% above national averages</text>
  <text x="340" y="405" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7a6b5c">Add 10&#x2013;20% contingency for any project in older Seattle housing stock</text>

  <!-- Footer -->
  <text x="340" y="445" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8a8880">nwhomeworks.com · Pricing based on actual Seattle-area projects, 2026</text>
</svg>
