<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cv-title cv-desc" style="font-family:'Outfit','Figtree',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;max-width:100%;height:auto;">
  <title id="cv-title">Top 10 home renovation projects by cost recouped at resale</title>
  <desc id="cv-desc">A ranked table of ten common home renovation projects, ordered by percentage of project cost recouped at resale, with national average cost and dollar amount recouped, based on the Cost vs. Value Report and the NAR Remodeling Impact Report.</desc>

